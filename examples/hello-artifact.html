<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hello Artifact</title>
<style>
  body { margin:0; font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#0d0d0f; color:#eee; display:grid; place-items:center; min-height:100vh; }
  .card { text-align:center; padding:48px; border:1px solid #262629; border-radius:16px;
    background:#161618; max-width:480px; }
  h1 { margin:0 0 8px; letter-spacing:-0.02em; }
  p { color:#999; margin:0 0 24px; }
  button { background:#3b82f6; color:#fff; border:0; padding:10px 18px; border-radius:9px;
    font-size:15px; font-weight:600; cursor:pointer; }
  #count { font-variant-numeric:tabular-nums; font-weight:700; }
</style>
</head>
<body>
  <div class="card">
    <h1>👋 Hello, Artifact</h1>
    <p>Self-contained, no external requests — works under the strict CSP.</p>
    <button id="btn">Clicked <span id="count">0</span> times</button>
  </div>
  <script>
    let n = 0;
    const count = document.getElementById("count");
    document.getElementById("btn").addEventListener("click", () => { count.textContent = ++n; });
  </script>
</body>
</html>
