<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hello Artifact</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f4f4f5; --card: #fff; --fg: #0a0a0b; --muted: #71717a;
    --accent: #4f46e5; --line: rgba(0,0,0,0.08);
    --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #09090b; --card: #141417; --fg: #fafafa; --muted: #a1a1aa;
      --accent: #818cf8; --line: rgba(255,255,255,0.08);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--fg); background: var(--bg); -webkit-font-smoothing: antialiased;
    padding: 24px;
  }
  .card {
    text-align: center; padding: 40px 36px; max-width: 420px; width: 100%;
    background: var(--card); border-radius: 16px;
    box-shadow: 0 0 0 1px var(--line), 0 8px 24px rgba(0,0,0,0.06);
  }
  h1 { margin: 0 0 8px; letter-spacing: -0.02em; text-wrap: balance; font-size: 1.5rem; }
  p { color: var(--muted); margin: 0 0 24px; }
  button {
    background: var(--accent); color: #fff; border: 0; min-height: 40px;
    padding: 0 18px; border-radius: 10px; font: inherit; font-size: 15px;
    font-weight: 600; cursor: pointer;
    transition: transform 150ms var(--ease-out), opacity 150ms ease;
  }
  button:hover { opacity: 0.92; }
  button:active { transform: scale(0.98); }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  #count { font-variant-numeric: tabular-nums; font-weight: 700; }
  @media (prefers-reduced-motion: reduce) {
    button { transition: none; }
  }
</style>
</head>
<body>
  <div class="card">
    <h1>👋 Hello, Artifact</h1>
    <p>Self-contained, no external requests — works under the strict CSP.</p>
    <button id="btn" type="button">Clicked <span id="count">0</span> times</button>
  </div>
  <script>
    let n = 0;
    const count = document.getElementById("count");
    document.getElementById("btn").addEventListener("click", () => { count.textContent = ++n; });
  </script>
</body>
</html>
